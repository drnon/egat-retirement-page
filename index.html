<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EGAT Retirement Page</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --accent: #dc2626;
      --line: #dbe3ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Sarabun", "Noto Sans Thai", system-ui, sans-serif;
      background: radial-gradient(circle at top left, #ffffff 0%, var(--bg) 65%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px 16px 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      line-height: 1.2;
    }
    .meta { color: var(--muted); margin: 0 0 14px; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
    }
    .btn.secondary {
      background: #1d4ed8;
    }
    .note {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 8px 0 14px;
    }
    iframe {
      width: 100%;
      min-height: min(78vh, 900px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    @media (max-width: 640px) {
      .wrap { padding: 12px; }
      .card { padding: 14px; }
      iframe { min-height: 72vh; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>EGAT Retirement Dashboard</h1>
      <p class="meta">หน้าแสดงผลถูกย้ายมาอยู่บน GitHub Pages แล้ว เพื่อให้เปิดได้ง่ายจากเครือข่ายที่จำกัดการเข้าเซิร์ฟเวอร์โดยตรง</p>

      <div class="actions">
        <a class="btn" href="https://app.powerbi.com/view?r=eyJrIjoiMzZjYWU3YmQtNWQ1Ny00NjdjLWI1MmEtYjExY2ZiYWIxMzNiIiwidCI6IjVmZWJjNjlmLThlOWMtNDcwOC1iNzBlLWQ4YzYyYmUxODA1YiIsImMiOjEwfQ%3D%3D" target="_blank" rel="noopener">เปิดในแท็บใหม่</a>
        <a class="btn secondary" href="https://github.com/drnon/egat-retirement-page" target="_blank" rel="noopener">ดู Source บน GitHub</a>
      </div>

      <p class="note">ถ้า iframe ไม่แสดงผล ให้กดปุ่ม "เปิดในแท็บใหม่" ด้านบนได้ทันที</p>

      <iframe
        title="EGAT Retirement Power BI"
        src="https://app.powerbi.com/view?r=eyJrIjoiMzZjYWU3YmQtNWQ1Ny00NjdjLWI1MmEtYjExY2ZiYWIxMzNiIiwidCI6IjVmZWJjNjlmLThlOWMtNDcwOC1iNzBlLWQ4YzYyYmUxODA1YiIsImMiOjEwfQ%3D%3D"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
      </iframe>
    </section>
  </main>
</body>
</html>
